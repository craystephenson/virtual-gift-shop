    (function(){if(localStorage.getItem('honchie-theme')!=='classic'){var l=document.querySelector('link[href*="shop.css"]');var h=l?l.href.replace('shop.css','shop-modern.css'):'css/shop-modern.css';var s=document.createElement('link');s.rel='stylesheet';s.href=h;s.id='theme-modern-css';document.head.appendChild(s);document.documentElement.classList.add('theme-modern');}})();
  </script>
</head>

<form style="text-align: center; padding: 16px 0;" method="GET" action="search.html" name="FrontPage_Form1" onsubmit="return FrontPage_Form1_Validator(this)">
  <input name="q" size="20" placeholder="Search for a product"> <input type="submit" value="Let's Shop!">
</form>

<div class="homepage">
  <section class="homepage-carousel" id="homepage-carousel" aria-hidden="true">
    <h2 class="carousel-header">Save on our most sought-after items</h2>
    <div class="carousel-inner">
      <div class="carousel-slides" id="carousel-slides"></div>
      <div class="carousel-caption" id="carousel-caption"></div>
    </div>
  </section>
</div>

<script>
function FrontPage_Form1_Validator(theForm) {
  const q = theForm.q ? theForm.q.value : (theForm.name && theForm.name.value);
  if (!q || q.trim() === "") {
    alert("Please enter a product name to search.");
    (theForm.q || theForm.name).focus();
    return false;
  }
  if (q.trim().length < 2) {
    alert("Please enter at least 2 characters to search.");
    (theForm.q || theForm.name).focus();
    return false;
  }
  if (theForm.q) theForm.q.value = q.trim();
  return true;
}
</script>
